services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    command: >
      bash -lc "pip install --no-cache-dir -r backend/requirements.txt &&
      uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    environment:
      SQLITE_DB_PATH: /app/data/streettrade.db
      GOOGLE_STREETVIEW_API_KEY: ${GOOGLE_STREETVIEW_API_KEY:-}
      MAPILLARY_ACCESS_TOKEN: ${MAPILLARY_ACCESS_TOKEN:-}
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY:-}
      HF_API_TOKEN: ${HF_API_TOKEN:-}
      YELP_API_KEY: ${YELP_API_KEY:-}
      FOURSQUARE_API_KEY: ${FOURSQUARE_API_KEY:-}

  frontend:
    image: node:20
    working_dir: /app/frontend
    command: >
      bash -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
